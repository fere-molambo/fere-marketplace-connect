<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Retour à Fere</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    background: #FFFFFF;
    color: #003E2F;
    padding: 24px;
  }
  .card {
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(0, 62, 47, 0.15);
    border-top-color: #003E2F;
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
  p { font-size: 14px; color: #4a4a4a; margin: 0 0 24px; line-height: 1.5; }
  a.btn {
    display: inline-block;
    background: #003E2F;
    color: #fff;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
  }
  #fallback { display: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Retour à l'application Fere…</h1>
    <p id="msg">Veuillez patienter, nous vous redirigeons.</p>
    <div id="fallback">
      <a class="btn" id="deeplink" href="#">Rouvrir Fere</a>
    </div>
  </div>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var ref = params.get('ref') || '';
    var cancel = params.get('cancel') === '1';

    var deepLink = cancel
      ? 'fere://checkout?cancel=1' + (ref ? '&ref=' + encodeURIComponent(ref) : '')
      : 'fere://payment/callback?ref=' + encodeURIComponent(ref);

    var webFallback = cancel
      ? '/checkout'
      : '/payment/callback?ref=' + encodeURIComponent(ref);

    document.getElementById('deeplink').setAttribute('href', deepLink);

    // Try deep link immediately (works in mobile WebView / mobile browsers)
    var start = Date.now();
    window.location.href = deepLink;

    // If we're still here after 2s, we're probably on web — redirect to React callback
    setTimeout(function () {
      if (Date.now() - start < 1900) return; // page was backgrounded (app opened)
      document.getElementById('msg').textContent =
        "Si l'application ne s'ouvre pas, continuez ici.";
      document.getElementById('fallback').style.display = 'block';
      // Auto-redirect web users to the React callback page
      setTimeout(function () { window.location.replace(webFallback); }, 1500);
    }, 2000);
  })();
</script>
</body>
</html>
